<div class="parametro">
            <h3 class="parametro-titulo">Personalize sua senha</h3>
            <div class="parametro-coluna__senha">
                <div class="parametro-senha">
                    <h4 class="parametro-senha__titulo">Número de caracteres</h4>
                    <div class="parametro-senha-botoes">
                        <button class="parametro-senha__botao" id="diminuir">-</button>
                        <p class="parametro-senha__texto" id="tamanho">12</p>
                        <button class="parametro-senha__botao" id="aumentar">+</button>
                    </div>
                </div>
                <div class="parametro-senha">
                    <h4 class="parametro-senha__titulo">Características da senha</h4>
                    <div class="parametro-senha-checkbox">
                        <input type="checkbox" id="maiusculas" checked>
                        <label for="maiusculas">Letras maiúsculas</label>
                    </div>
                    <div class="parametro-senha-checkbox">
                        <input type="checkbox" id="minusculas" checked>
                        <label for="minusculas">Letras minúsculas</label>
                    </div>
                    <div class="parametro-senha-checkbox">
                        <input type="checkbox" id="numeros" checked>
                        <label for="numeros">Números</label>
                    </div>
                    <div class="parametro-senha-checkbox">
                        <input type="checkbox" id="simbolos" checked>
                        <label for="simbolos">Símbolos</label>
                    </div>
                </div>
            </div>

            <div class="parametro-senha">
                <h4 class="parametro-senha__titulo">Força da senha</h4>
                <div class="barra"></div>
                <div class="forca fraca"></div>
                <div class="parametro-senha-textos">
                    <p>Fraca</p>
                    <p>Média</p>
                    <p>Forte</p>
                </div>
            </div>
        </div>
    </section>
    <script src="main.js"></script>
</body>
</html>
